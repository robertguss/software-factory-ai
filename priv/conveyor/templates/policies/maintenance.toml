[policy]
name = "maintenance"
profile = "maintenance"
autonomy_ceiling = "L0"  # ADVISORY: not enforced on the default (Claude Code) run path (see docs/audits/config-surface-truth.md)
network = "none"
future_gated = true

allowlist = []

denylist = [
  "rm -rf",
  "recursive chmod",
  "recursive chown",
  "git reset --hard",
  "git clean -fd",
  "git push --force",
  "sudo",
  "curl | sh",
  "wget | sh",
  "deploy",
  "kubectl apply",
  "terraform apply"
]

[policy.env]
allowlist = []
deny_production_secrets = true  # ADVISORY: not enforced; only [policy.env].allowlist is read
[policy.budget]
max_tool_calls = 0
