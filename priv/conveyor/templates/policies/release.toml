[policy]
name = "release"
profile = "release"
autonomy_ceiling = "L0"  # ADVISORY: not enforced on the default (Claude Code) run path (see docs/audits/config-surface-truth.md)
network = "none"
future_gated = true

allowlist = []

denylist = [
  "deploy",
  "release",
  "publish",
  "package-upload",
  "kubectl apply",
  "terraform apply",
  "git push --force",
  "sudo",
  "curl | sh",
  "wget | sh"
]

[policy.env]
allowlist = []
deny_production_secrets = true  # ADVISORY: not enforced; only [policy.env].allowlist is read
[policy.budget]
max_tool_calls = 0
