name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PGHOST: localhost
  PGUSER: postgres
  PGPASSWORD: postgres

jobs:
  test:
    name: Format, test, Credo, Dialyzer
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20.1"
          otp-version: "29.0"

      - name: Set up Python
        # Required by the eval Toolchain Runner (F1) / Mutant Gauntlet (E1), which
        # build a venv from the sample's requirements.lock and run pytest.
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache dependencies and PLTs
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-beam-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beam-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: MIX_ENV=test mix test

      - name: Run Rung-0 evals (emit scorecard inputs)
        # E1/E7/E8 -> eval/scorecards/inputs/*.json (DB-free; uses the venv pytest).
        run: MIX_ENV=test mix conveyor.eval.rung0

      - name: Replay cassette corpus (emit replay_fidelity)
        # Replays cassettes recorded by `mix test` (DB-free); emits replay_fidelity.
        run: MIX_ENV=test mix conveyor.eval.replay --all

      - name: Project lift-duel report (emit lift_vs_vanilla)
        # The R5 lift duel runs during `mix test` (it needs the DB-backed agent-session
        # chain) and writes a full conveyor.eval_lift@1 report to eval/lift/. This
        # DB-free step projects it into scorecard inputs (lift_vs_vanilla, pass_at_1,
        # cost_per_verified_ac). Degrades to a no-op when no report is present.
        run: MIX_ENV=test mix conveyor.eval.lift

      - name: Eval scorecard gate
        # Aggregates eval/scorecards/inputs/*.json into conveyor.eval_scorecard@1
        # and exits non-zero if any blocking metric (false_pass_rate>0, etc.) is
        # present. DB-free. See docs/3_evals/IMPLEMENTATION-PLAN-RUNGS-0-1.md (F2).
        run: MIX_ENV=test mix conveyor.eval.scorecard --gate

      - name: Run Credo
        run: mix credo --strict

      - name: Run Dialyzer
        run: mix dialyzer
