name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PGHOST: localhost
  PGUSER: postgres
  PGPASSWORD: postgres

jobs:
  test:
    name: Format, test, Credo, Dialyzer
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20.1"
          otp-version: "29.0"

      - name: Cache dependencies and PLTs
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-beam-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-beam-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: MIX_ENV=test mix test

      - name: Run Credo
        run: mix credo --strict

      - name: Run Dialyzer
        run: mix dialyzer
